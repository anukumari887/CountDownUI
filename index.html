<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count-Down</title>
    <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer">
   <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll/bundled/locomotive-scroll.min.js"></script>
</head>
<body>
    <section class="wrapper">
        <div class="image">
            <img src="https://i.pinimg.com/736x/3c/4f/07/3c4f07e8d399b3fce5c6d3e1d6ece67a.jpg" alt="">
        </div>
        <nav class="navbar">
            <h1>Count-Down</h1>
        </nav>

        <div class="box">
            <div class="circle1">
                 <div class="circle2"><i class="fa-solid fa-hourglass-half" style="color: rgb(0, 0, 0);"></i></div>
            </div>
        </div>

        <div class="icon">
            <i id="pause" class="fa-regular fa-circle-stop" style="color: rgb(255, 255, 255);"></i>
            <i id="play" class="fa-solid fa-circle-play" style="color: rgb(255, 255, 255);"></i>
            <i id="reset" class="fa-solid fa-rotate-left" style="color: rgb(255, 255, 255);"></i>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
